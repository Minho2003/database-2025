<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라이더 페이지</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

body {
  margin: 0;
  padding: 0;
  background: #f8f9fa;
  font-family: 'Jua', sans-serif;
}

.app-container {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: #fff;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

/* 상단바 */
.top-bar {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 2px solid #eee;
}

.back-btn {
  background: none;
  border: none;
  font-size: 26px;
  cursor: pointer;
  margin-right: 10px;
}

.page-title {
  font-size: 24px;
  font-weight: bold;
  flex: 1;
  text-align: center;
  margin-right: 35px;
}

/* 주문 카드 */
.order-card {
  background: #f8f9fa;
  border: 2px solid #e9ecef;
  border-radius: 12px;
  padding: 16px;
  margin: 16px;
}

.order-title {
  font-size: 20px;
  font-weight: bold;
  margin-bottom: 6px;
}

.order-text {
  font-size: 16px;
  color: #555;
  margin: 4px 0;
}

.order-btns {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
}

.accept-btn, .deny-btn, .done-btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin-right: 8px;
  font-family: 'Jua', sans-serif;
}

.accept-btn { background: #00d2be; }
.deny-btn { background: #ff7675; }
.done-btn { background: #6c5ce7; }

.accept-btn:last-child, 
.deny-btn:last-child,
.done-btn:last-child {
  margin-right: 0;
}

.empty-box {
  text-align: center;
  margin-top: 50px;
  color: #aaa;
  font-size: 18px;
}
</style>
</head>

<body>
<div class="app-container">

  <!-- 상단바 -->
  <header class="top-bar">
    <button class="back-btn" onclick="location.href='setting.html'">←</button>
    <h1 class="page-title">라이더 페이지</h1>
  </header>

  <div id="orderList"></div>

</div>

<script>
// =====================================
// 1) 로그인 체크
// =====================================
let user = JSON.parse(localStorage.getItem("currentUser") || "null");
if (!user) location.href = "firstpage.html";

// =====================================
// 2) 주문 정보 불러오기
// (payment.html에서 저장한 orders)
// =====================================
let orders = JSON.parse(localStorage.getItem("orders") || "[]");

// =====================================
// 3) 화면 렌더링
// =====================================
function renderOrders() {
  const box = document.getElementById("orderList");
  box.innerHTML = "";

  const waitingOrders = orders.filter(o => o.status === "waiting");

  if (waitingOrders.length === 0) {
    box.innerHTML = `<p class="empty-box">대기 중인 주문이 없습니다 🚴‍♂️</p>`;
    return;
  }

  waitingOrders.forEach(order => {
    const div = document.createElement("div");
    div.className = "order-card";

    div.innerHTML = `
      <div class="order-title">${order.storeName}</div>
      <div class="order-text">주문자: ${order.username}</div>
      <div class="order-text">주소: ${order.address}</div>
      <div class="order-text">주문 메뉴: ${order.items.map(i => i.menuName + " x" + i.quantity).join(", ")}</div>

      <div class="order-btns">
        <button class="accept-btn" onclick="acceptOrder(${order.id})">수락</button>
        <button class="deny-btn" onclick="denyOrder(${order.id})">거절</button>
      </div>
    `;

    box.appendChild(div);
  });
}

// =====================================
// 4) 수락 / 거절 / 완료 기능
// =====================================
function acceptOrder(id) {
  const order = orders.find(o => o.id === id);
  if (!order) return;

  order.status = "accepted";
  localStorage.setItem("orders", JSON.stringify(orders));

  showAccepted(order);
}

function denyOrder(id) {
  orders = orders.filter(o => o.id !== id);
  localStorage.setItem("orders", JSON.stringify(orders));

  alert("주문을 거절했습니다.");
  renderOrders();
}

function showAccepted(order) {
  const box = document.getElementById("orderList");
  box.innerHTML = "";

  box.innerHTML = `
    <div class="order-card">
      <div class="order-title">${order.storeName}</div>
      <div class="order-text">배달 중입니다…</div>
      <div class="order-text">주소: ${order.address}</div>
      <button class="done-btn" style="margin-top:12px;" onclick="finishOrder(${order.id})">배달 완료</button>
    </div>
  `;
}

function finishOrder(id) {
  const order = orders.find(o => o.id === id);
  if (!order) return;

  order.status = "delivered";
  localStorage.setItem("orders", JSON.stringify(orders));

  alert("배달을 완료했습니다!");
  renderOrders();
}

// =====================================
// FastAPI 교체 예정 (참고)
// =====================================
/*
fetch("/api/orders/waiting")
fetch("/api/orders/{id}/accept")
fetch("/api/orders/{id}/deny")
fetch("/api/orders/{id}/deliver")
*/

// =====================================
// 초기 화면
// =====================================
renderOrders();
</script>

</body>
</html>
