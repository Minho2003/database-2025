<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>설정</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Jua', sans-serif;
      background-color: #f8f9fa;
    }

    .app-container {
      max-width: 480px;
      margin: 0 auto;
      background-color: #ffffff;
      min-height: 100vh;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    .top-bar {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 2px solid #e9ecef;
      position: sticky;
      top: 0;
      background-color: #ffffff;
      z-index: 10;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      transition: 0.2s;
    }
    .back-btn:hover { transform: scale(1.1); }

    .page-title {
      flex: 1;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      margin-right: 20px;
    }

    .content { padding: 20px; }

    .input-group { margin-bottom: 18px; }

    .label { font-size: 15px; margin-bottom: 6px; }

    .input-field {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      background-color: #ffffff;
      font-family: 'Jua', sans-serif;
      transition: 0.2s;
    }

    .input-field:focus {
      border-color: #00d2be;
      outline: none;
    }

    .save-btn {
      width: 100%;
      background-color: #00d2be;
      color: white;
      border: none;
      padding: 14px;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.2s;
    }
    .save-btn:hover {
      background-color: #00b8a6;
      transform: translateY(-2px);
    }

    .menu-btn {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background-color: #2d3436;
      color: white;
      transition: 0.2s;
    }
    .menu-btn:hover { transform: translateY(-2px); }

    .logout-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background-color: #dc3545;
      color: white;
      transition: 0.2s;
    }
    .logout-btn:hover {
      background-color: #c82333;
      transform: translateY(-2px);
    }

  </style>
</head>

<body>
<div class="app-container">

  <!-- 상단바 -->
  <header class="top-bar">
    <button class="back-btn" onclick="history.back()">←</button>
    <h1 class="page-title">설정</h1>
  </header>

  <main class="content">

    <!-- 아이디 -->
    <div class="input-group">
      <p class="label">아이디</p>
      <input type="text" id="userIdInput" class="input-field" disabled>
    </div>

    <!-- 이름 -->
    <div class="input-group">
      <p class="label">이름</p>
      <input type="text" id="userNameInput" class="input-field">
    </div>

    <!-- 전화번호 -->
    <div class="input-group">
      <p class="label">전화번호</p>
      <input type="text" id="userPhoneInput" class="input-field">
    </div>

    <!-- 주소 -->
    <div class="input-group">
      <p class="label">주소</p>
      <input type="text" id="userAddressInput" class="input-field">
    </div>

    <!-- 비밀번호 -->
    <div class="input-group">
      <p class="label">비밀번호</p>
      <input type="password" id="userPwInput" class="input-field">
    </div>

    <!-- 저장 -->
    <button class="save-btn" id="saveBtn">저장하기</button>

    <!-- 페이지 이동 -->
    <button class="menu-btn" onclick="location.href='owner.html'">사장님 페이지</button>
    <button class="menu-btn" onclick="location.href='rider.html'">라이더 페이지</button>

    <!-- 로그아웃 -->
    <button class="logout-btn" id="logoutBtn">로그아웃</button>

  </main>
</div>

<script>
  /* =====================================================
     1) 현재 로그인된 사용자 정보 불러오기
  ====================================================== */
  let currentUser = JSON.parse(localStorage.getItem("currentUser") || "null");

  if (!currentUser) {
    alert("로그인이 필요합니다.");
    window.location.href = "firstpage.html";
  }

  // 기존 정보 입력
  document.getElementById("userIdInput").value = currentUser.userId;
  document.getElementById("userNameInput").value = currentUser.name;
  document.getElementById("userPhoneInput").value = currentUser.phone;
  document.getElementById("userAddressInput").value = currentUser.address || "";
  document.getElementById("userPwInput").value = currentUser.password;

/* =====================================================
   2) 저장하기 버튼
====================================================== */
document.getElementById("saveBtn").addEventListener("click", () => {

  const newName    = document.getElementById("userNameInput").value.trim();
  const newPhone   = document.getElementById("userPhoneInput").value.trim();
  const newAddress = document.getElementById("userAddressInput").value.trim();
  const newPw      = document.getElementById("userPwInput").value.trim();

  // 현재 유저 정보 업데이트
  currentUser.name = newName;
  currentUser.phone = newPhone;
  currentUser.address = newAddress;
  currentUser.password = newPw;

  // users 배열 업데이트
  let users = JSON.parse(localStorage.getItem("users") || "[]");
  const idx = users.findIndex(u => u.userId === currentUser.userId);
  if (idx >= 0) {
    users[idx] = currentUser;
  }

  // 수정된 회원 정보 저장
  localStorage.setItem("users", JSON.stringify(users));
  localStorage.setItem("currentUser", JSON.stringify(currentUser));

  // ⭐ 배송지 자동 적용을 위해 별도로 저장
  localStorage.setItem("userAddress", newAddress);

  alert("정보가 저장되었습니다!");


    /*
      ============================
      FastAPI 연동 예시
      ============================
      fetch("/api/user/update", {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(currentUser)
      });
    */
  });

  /* =====================================================
     3) 로그아웃 기능
  ====================================================== */
  document.getElementById("logoutBtn").addEventListener("click", () => {

    // 현재 로그인 정보 삭제
    localStorage.removeItem("currentUser");

    // 필요하면 장바구니도 로그아웃 시 초기화 가능
    // localStorage.removeItem("cart");

    alert("로그아웃되었습니다.");
    window.location.href = "firstpage.html";

    /*
      FastAPI 연동 시:

      fetch("/api/logout", { method: "POST" })
      .then(() => window.location.href = "firstpage.html");

    */
  });
</script>

</body>
</html>
